<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>体彩足球 · 历史交锋</title>
  <style>
    :root{--bg:#f4f7f5;--card:#fff;--ink:#15241d;--muted:#718078;--green:#087f5b;--line:#dfe7e2;--red:#c92a2a;--amber:#e67700}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.55 system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif}
    header{background:linear-gradient(120deg,#073b2d,#0c7657);color:#fff;padding:34px max(24px,calc((100% - 1180px)/2)) 68px}
    header h1{font-size:28px;margin:0 0 6px}header p{margin:0;color:#cce5dc}
    main{max-width:1180px;margin:-38px auto 50px;padding:0 20px}.panel,.match{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 28px #173b2a12}
    .panel{padding:18px;display:flex;gap:14px;align-items:end;flex-wrap:wrap}.field{display:grid;gap:6px}.field label{color:var(--muted);font-size:12px}.field input{width:145px;padding:10px 12px;border:1px solid #ccd8d1;border-radius:8px;font:inherit}
    button,.download{border:0;border-radius:8px;padding:11px 18px;background:var(--green);color:#fff;font-weight:650;cursor:pointer;text-decoration:none;display:inline-block}button:disabled{opacity:.55;cursor:wait}.download{background:#e8f5ef;color:#087f5b;padding:9px 13px}.downloads{margin-left:auto;display:flex;gap:8px}
    #status{margin:18px 2px;color:var(--muted)}.spinner{display:inline-block;width:14px;height:14px;border:2px solid #b8d4c9;border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:7px}@keyframes spin{to{transform:rotate(360deg)}}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:11px;padding:14px}.stat b{font-size:22px;display:block}.stat span{color:var(--muted)}
    .toolbar{display:flex;gap:10px;margin:16px 0}.toolbar input{flex:1;max-width:340px;padding:10px 12px;border:1px solid var(--line);border-radius:8px}.matches{display:grid;gap:14px}.match{overflow:hidden}.match-head{padding:16px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px;cursor:pointer}.teams{font-size:17px;font-weight:700}.team-home{color:#1971c2;font-weight:700}.team-away{color:#d9480f;font-weight:700}.role{display:inline-block;margin-right:4px;padding:1px 5px;border-radius:4px;font-size:10px;vertical-align:1px}.role-home{color:#1864ab;background:#e7f5ff}.role-away{color:#c2410c;background:#fff4e6}.meta{color:var(--muted);font-size:12px;margin-top:3px}.summary{text-align:right}.record{font-size:16px;font-weight:700}.win{color:var(--green)}.draw{color:var(--amber)}.loss{color:var(--red)}
    .detail{display:none;border-top:1px solid var(--line);padding:0 18px 18px}.match.open .detail{display:block}.odds{display:flex;gap:12px;flex-wrap:wrap;padding:13px 0;color:var(--muted)}table{width:100%;border-collapse:collapse}th,td{padding:9px 8px;border-bottom:1px solid #edf1ee;text-align:left}th{color:var(--muted);font-weight:600;font-size:12px}.score{font-weight:700;white-space:nowrap}.empty{padding:38px;text-align:center;color:var(--muted)}.error{color:var(--red)}
    .bet-area{padding:0 18px 15px}.bet-row{display:grid;grid-template-columns:62px repeat(3,1fr);gap:5px;margin-top:5px}.market-label{display:grid;place-items:center;color:var(--red);font-size:12px;border-radius:6px;background:#fff5f5}.bet-option{padding:7px 4px;border:1px solid #dbe2de;background:#fff;color:#34443c;border-radius:6px;text-align:center;cursor:pointer;line-height:1.25}.bet-option b{display:block;color:#f03e3e;font-size:13px}.bet-option.selected{background:#fa5252;border-color:#fa5252;color:#fff}.bet-option.selected b{color:#fff}
    .bet-summary{position:sticky;bottom:0;z-index:5;margin-top:18px;padding:12px 16px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 -6px 24px #173b2a1c;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center}.bet-count b,.money{color:#fa5252;font-size:18px}.bet-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.bet-controls input{height:38px;border:1px solid #d5ddd8;border-radius:7px;padding:0 10px;background:#fff;width:75px}.pass-options{display:flex;gap:5px;flex-wrap:wrap}.pass-option{padding:8px 12px}.summary-actions{display:flex;gap:8px}.secondary{background:#fff;color:var(--green);border:1px solid var(--green)}.clear-btn{background:#f1f3f2;color:#6d7872}.scheme{position:fixed;inset:0;background:#10251b66;z-index:20;display:none;place-items:center;padding:20px}.scheme.show{display:grid}.scheme-box{background:#fff;width:min(580px,100%);max-height:75vh;overflow:auto;border-radius:14px;padding:20px;box-shadow:0 20px 60px #0003}.scheme-head{display:flex;justify-content:space-between;align-items:center}.scheme-head h2{margin:0}.scheme-list{margin:14px 0}.scheme-item{padding:10px 0;border-bottom:1px solid var(--line)}
    @media(max-width:700px){header{padding-bottom:58px}.downloads{margin-left:0;width:100%}.stats{grid-template-columns:repeat(2,1fr)}.match-head{align-items:flex-start}.summary{font-size:12px}.hide-mobile{display:none}table{font-size:12px}th,td{padding:8px 4px}.bet-summary{grid-template-columns:1fr}.summary-actions button{flex:1}.bet-row{grid-template-columns:48px repeat(3,1fr)}}
  </style>
</head>
<body>
  <header><h1>体彩足球 · 历史交锋</h1><p>获取当前赛事，查看双方近期交锋、胜率与进失球</p></header>
  <main>
    <section class="panel">
      <div class="field"><label for="limits">每场历史条数</label><input id="limits" type="number" min="1" max="100" value="10"></div>
      <div class="field"><label for="workers">并发请求数</label><input id="workers" type="number" min="1" max="10" value="4"></div>
      <button id="query">获取最新比赛</button><button id="syncResults" class="secondary">更新比赛结果</button><button id="save" class="secondary">保存当前结果</button><button id="savePlan" class="secondary">保存方案</button><button id="plans" class="secondary">方案管理</button>
      <div class="downloads"><a class="download" href="/download/markdown">下载 Markdown</a><a class="download" href="/download/json">下载 JSON</a></div>
    </section>
    <div id="status">点击“获取最新比赛”开始查询。</div>
    <section id="content"></section>
    <section id="betSummary" class="bet-summary" hidden></section>
  </main>
  <div id="scheme" class="scheme"><div class="scheme-box"><div class="scheme-head"><h2>投注方案</h2></div><div id="schemeBody"></div></div></div>
  <script>
    const $=s=>document.querySelector(s), esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const resultLabel={win:'胜',draw:'平',loss:'负',unknown:'未知'}, outcomeLabel={h:'胜',d:'平',a:'负'};
    let currentData=null, selections=new Map(), passCounts=new Set([2]), multiplier=1;
    function render(data){
      const matches=data.matches||[], errors=data.errors||[];
      $('#status').textContent=`更新于 ${new Date(data.generatedAt).toLocaleString()}，查询完成。点击比赛可展开交锋明细。`;
      $('#content').innerHTML=`<div class="stats"><div class="stat"><b>${data.total||0}</b><span>当前比赛</span></div><div class="stat"><b>${matches.length}</b><span>查询成功</span></div><div class="stat"><b>${errors.length}</b><span>查询失败</span></div><div class="stat"><b>${data.limits||0}</b><span>历史场数上限</span></div></div><div class="toolbar"><input id="filter" placeholder="搜索球队、联赛或场次…"></div><div class="matches">${matches.map(card).join('')||'<div class="empty">暂无比赛数据</div>'}</div>${errors.length?`<div class="error">失败：${errors.map(e=>esc(e.matchId)).join('、')}</div>`:''}`;
      currentData=data; selections.clear(); passCounts=new Set([2]); multiplier=1;
      try { const saved=JSON.parse(localStorage.getItem('sportteryBets')||'{}'); passCounts=new Set(saved.passCounts||[2]); multiplier=saved.multiplier||1; (saved.selections||[]).forEach(x=>selections.set(x.key,x)); } catch(e) {}
      document.querySelectorAll('.match-head').forEach(x=>x.onclick=()=>x.parentElement.classList.toggle('open'));
      document.querySelectorAll('.bet-option').forEach(x=>x.onclick=e=>{e.stopPropagation();toggleBet(x)});
      selections.forEach((v,key)=>{const el=document.querySelector(`[data-key="${key}"]`);if(el)el.classList.add('selected')});
      $('#filter').oninput=e=>{const q=e.target.value.trim().toLowerCase();document.querySelectorAll('.match').forEach(x=>x.hidden=!x.dataset.search.includes(q))};
      renderBetSummary();
    }
    function betCell(m,market,outcome,odds){return `<button class="bet-option" data-key="${m.matchId}|${market}|${outcome}" data-match="${m.matchId}" data-market="${market}" data-outcome="${outcome}" data-odds="${Number(odds)||0}"><b>${outcomeLabel[outcome]}</b>${esc(odds||'-')}</button>`}
    function teamClass(role){return role==='currentHome'?'team-home':role==='currentAway'?'team-away':''}
    function card(m){const s=m.historySummary,h=m.odds.had||{},hh=m.odds.hhad||{};return `<article class="match" data-search="${esc(`${m.matchNum} ${m.league} ${m.homeTeam} ${m.awayTeam}`.toLowerCase())}"><div class="match-head"><div><div class="teams"><span class="role role-home">主</span><span class="team-home">${esc(m.homeTeam)}</span> <span style="color:#9aa69f;font-weight:400">vs</span> <span class="role role-away">客</span><span class="team-away">${esc(m.awayTeam)}</span></div><div class="meta">${esc(m.matchNum)} · ${esc(m.league)} · ${esc(m.matchDateTime)}</div></div><div class="summary"><div class="record"><span class="win">${s.wins}胜</span> · <span class="draw">${s.draws}平</span> · <span class="loss">${s.losses}负</span></div><div class="meta">${s.perspective}视角 · 胜率 ${s.winRate}% · ${s.goalsFor}:${s.goalsAgainst}</div></div></div><div class="bet-area"><div class="bet-row"><div class="market-label">[0]</div>${betCell(m,'had','h',h.h)}${betCell(m,'had','d',h.d)}${betCell(m,'had','a',h.a)}</div><div class="bet-row"><div class="market-label">[${esc(hh.goalLine||'-')}]</div>${betCell(m,'hhad','h',hh.h)}${betCell(m,'hhad','d',hh.d)}${betCell(m,'hhad','a',hh.a)}</div></div><div class="detail"><div class="odds"><span>排名 ${esc(m.homeRank||'-')} / ${esc(m.awayRank||'-')}</span></div>${m.history.length?`<table><thead><tr><th>日期</th><th>赛事</th><th>历史主队</th><th>半场</th><th>全场</th><th>历史客队</th><th>结果</th></tr></thead><tbody>${m.history.map(r=>`<tr><td>${esc(r.date)}</td><td>${esc(r.tournament)}</td><td class="${teamClass(r.homeTeamRole)}">${esc(r.homeTeam)}</td><td class="score">${esc(r.halfTimeScore||'-')}</td><td class="score">${esc(r.score)}</td><td class="${teamClass(r.awayTeamRole)}">${esc(r.awayTeam)}</td><td class="${r.currentHomeTeamResult}">${resultLabel[r.currentHomeTeamResult]}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">暂无历史交锋</div>'}</div></article>`}
    function persistBets(){localStorage.setItem('sportteryBets',JSON.stringify({passCounts:[...passCounts],multiplier,selections:[...selections].map(([key,v])=>({key,...v}))}))}
    function toggleBet(el){const key=el.dataset.key;if(selections.has(key)){selections.delete(key);el.classList.remove('selected')}else{selections.set(key,{matchId:+el.dataset.match,market:el.dataset.market,outcome:el.dataset.outcome,odds:+el.dataset.odds});el.classList.add('selected')}persistBets();renderBetSummary()}
    function grouped(){const g=new Map();for(const v of selections.values()){if(!g.has(v.matchId))g.set(v.matchId,[]);g.get(v.matchId).push(v)}return g}
    function combinations(a,n){if(n===0)return [[]];if(a.length<n)return [];return a.flatMap((x,i)=>combinations(a.slice(i+1),n-1).map(r=>[x,...r]))}
    function totals(){const g=grouped(),groups=[...g.values()];let bets=0,min=0,max=0;for(const n of passCounts){if(n>groups.length)continue;for(const combo of combinations(groups,n)){bets+=combo.reduce((p,x)=>p*x.length,1);const odds=combo.map(x=>x.map(v=>v.odds));min+=odds.reduce((p,x)=>p*Math.min(...x),1);max+=odds.reduce((p,x)=>p*Math.max(...x),1)}}return {bets,min:min*2*multiplier,max:max*2*multiplier}}
    function renderBetSummary(){const box=$('#betSummary'),g=grouped(),count=g.size;if(!currentData){box.hidden=true;return}box.hidden=false;passCounts=new Set([...passCounts].filter(n=>n<=Math.max(count,1)));if(!passCounts.size&&count)passCounts.add(Math.min(2,count));const t=totals(),money=t.bets*2*multiplier,opts=Array.from({length:Math.max(count,1)},(_,i)=>{const n=i+1;return `<button class="${passCounts.has(n)?'':'secondary'} pass-option" data-pass="${n}">${n}关</button>`}).join('');box.innerHTML=`<div class="bet-count"><b>${count}</b> 场已选<br><span class="meta">${selections.size} 个选项</span></div><div class="bet-controls"><span>过关</span><span class="pass-options">${opts}</span><label>倍数 <input id="multiple" type="number" min="1" max="99999" value="${multiplier}"></label><span>共 <b>${t.bets}</b> 注，投注 <span class="money">${money.toFixed(2)} 元</span><br><span class="meta">理论奖金：${t.min.toFixed(2)} ~ ${t.max.toFixed(2)} 元</span></span></div><div class="summary-actions"><button class="clear-btn" id="clearBet">清空</button><button class="secondary" id="viewScheme" ${count?'':'disabled'}>查看方案</button></div>`;document.querySelectorAll('.pass-option').forEach(b=>b.onclick=()=>{const n=+b.dataset.pass;if(passCounts.has(n))passCounts.delete(n);else passCounts.add(n);persistBets();renderBetSummary()});$('#multiple').onchange=e=>{multiplier=Math.min(99999,Math.max(1,+e.target.value||1));persistBets();renderBetSummary()};$('#clearBet').onclick=()=>{selections.clear();persistBets();document.querySelectorAll('.bet-option.selected').forEach(x=>x.classList.remove('selected'));renderBetSummary()};$('#viewScheme').onclick=showScheme}
    function showScheme(){const g=grouped(),byId=new Map(currentData.matches.map(m=>[m.matchId,m]));$('#schemeBody').innerHTML=`<p>过关方式：${[...passCounts].sort((a,b)=>a-b).map(n=>n+'关').join('、')||'未选择'}　倍数：${multiplier}倍</p><div class="scheme-list">${[...g].map(([id,items])=>{const m=byId.get(id);return `<div class="scheme-item"><b>${esc(m.matchNum)} ${esc(m.homeTeam)} VS ${esc(m.awayTeam)}</b><br><span class="meta">${items.map(x=>`${x.market==='had'?'胜平负':'让球胜平负'} ${outcomeLabel[x.outcome]}(${x.odds})`).join('、')}</span></div>`}).join('')}</div>`;$('#scheme').classList.add('show')}
    function closeScheme(){$('#scheme').classList.remove('show')}
    $('#scheme').onclick=e=>{if(e.target===$('#scheme'))closeScheme()};
    async function savePlan(){if(!selections.size){$('#status').textContent='请先选择投注项';return}const name=prompt('请输入方案名称', '方案 '+new Date().toLocaleString());if(!name)return;const rawTags=prompt('请输入标签，多个标签用逗号分隔（可留空）','');const plan={name,selections:[...selections].map(([key,v])=>({key,...v})),passCounts:[...passCounts],multiplier,tags:(rawTags||'').split(/[,，]/).map(x=>x.trim()).filter(Boolean)};const r=await fetch('/api/plans',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plan})});const x=await r.json();$('#status').textContent=r.ok?'方案已保存：'+name:(x.error||'保存失败')}
    async function managePlans(){const r=await fetch('/api/plans'),plans=await r.json();$('#schemeBody').innerHTML=`<div class="scheme-list">${plans.length?plans.map((p,i)=>{const e=p.evaluation||{},settled=e.status==='settled',profit=e.profit||0,tags=p.tags||[];return `<div class="scheme-item"><b>${esc(p.name||'未命名方案')}</b> ${tags.map(t=>`<span class="role role-home">${esc(t)}</span>`).join('')}<br><span class="meta">${esc(p.updatedAt||'')} · ${p.selections?.length||0} 个选项 · ${(p.passCounts||[]).map(n=>n+'关').join('、')}</span><br>${settled?`<span>投注 ${e.stake.toFixed(2)} 元　奖金 ${e.prize.toFixed(2)} 元　<strong class="${profit>=0?'win':'loss'}">${profit>=0?'盈利':'亏损'} ${Math.abs(profit).toFixed(2)} 元</strong></span>`:`<span class="meta">已出结果 ${e.settledMatches||0}/${p.selections?.length||0}，等待结算</span>`}<br><button class="secondary" onclick="importPlan(${i})">导入并编辑</button> <button class="secondary" onclick="renamePlan(${i})">改名</button> <button class="secondary" onclick="tagPlan(${i})">标签</button> <button class="clear-btn" onclick="deletePlan('${esc(p.id)}')">删除</button></div>`}).join(''):'<div class="empty">暂无保存方案</div>'}</div>`;window._plans=plans;$('#scheme').classList.add('show')}
    function importPlan(i){const p=window._plans[i];if(!p)return;selections=new Map((p.selections||[]).map(x=>[x.key,x]));passCounts=new Set(p.passCounts||[2]);multiplier=p.multiplier||1;persistBets();closeScheme();document.querySelectorAll('.bet-option').forEach(el=>el.classList.toggle('selected',selections.has(el.dataset.key)));renderBetSummary();$('#status').textContent='已导入方案，可继续修改后再次保存。'}
    async function deletePlan(id){if(!confirm('确定删除这个方案吗？'))return;await fetch('/api/plans/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});managePlans()}
    async function updatePlan(plan){const r=await fetch('/api/plans',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plan})});if(!r.ok){const x=await r.json();alert(x.error||'保存失败')}else managePlans()}
    function renamePlan(i){const p=window._plans[i],name=prompt('请输入新的方案名称',p.name||'未命名方案');if(name&&name.trim()){p.name=name.trim();updatePlan(p)}}
    function tagPlan(i){const p=window._plans[i],raw=prompt('请输入标签，多个标签用逗号分隔（例如：已购,AI）',(p.tags||[]).join(','));if(raw!==null){p.tags=raw.split(/[,，]/).map(x=>x.trim()).filter(Boolean);updatePlan(p)}}
    $('#save').onclick=async()=>{try{const r=await fetch('/api/save',{method:'POST'}),x=await r.json();$('#status').textContent=r.ok?'已保存到本地，重启服务后会自动加载。':(x.error||'保存失败')}catch(e){$('#status').textContent='保存失败：'+e.message}};
    $('#savePlan').onclick=savePlan;$('#plans').onclick=managePlans;
    $('#syncResults').onclick=async()=>{const b=$('#syncResults');b.disabled=true;$('#status').innerHTML='<span class="spinner"></span>正在获取并追加比赛结果…';try{const r=await fetch('/api/results/sync',{method:'POST'}),x=await r.json();if(!r.ok)throw Error(x.error||'更新失败');$('#status').textContent=`赛果更新完成：新增 ${x.appended} 条，本地共 ${x.results.length} 条结果。`;await managePlans()}catch(e){$('#status').innerHTML=`<span class="error">${esc(e.message)}</span>`}finally{b.disabled=false}};
    fetch('/api/latest').then(r=>r.json()).then(data=>{if(data.matches&&data.matches.length)render(data)}).catch(()=>{});
    $('#query').onclick=async()=>{const btn=$('#query');btn.disabled=true;$('#status').innerHTML='<span class="spinner"></span>正在获取当前比赛和历史交锋，请稍候…';try{const res=await fetch('/api/query',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({limits:+$('#limits').value,workers:+$('#workers').value})});const data=await res.json();if(!res.ok)throw Error(data.error||'查询失败');render(data)}catch(e){$('#status').innerHTML=`<span class="error">${esc(e.message)}</span>`}finally{btn.disabled=false}};
  </script>
</body>
</html>
